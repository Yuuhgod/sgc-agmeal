{% extends "base.html" %}

{% block title %}SGC - Novo Cadastro{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header card-header-agmeal">
        <i class="fa-solid fa-user-plus me-2"></i>Novo Cadastro de Associado
    </div>
    <div class="card-body">
        <form action="/cadastro" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Matrícula *</label>
                    <input type="text" class="form-control" name="matricula" maxlength="20" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">CPF *</label>
                    <input type="text" class="form-control" name="cpf" maxlength="14" oninput="mascaraCPF(this)" placeholder="000.000.000-00" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">RG *</label>
                    <input type="text" class="form-control" name="rg" maxlength="20" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Data de Nascimento *</label>
                    <input type="date" class="form-control" name="data_nascimento" min="1900-01-01" max="2099-12-31" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">E-mail *</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Endereço Completo *</label>
                    <input type="text" class="form-control" name="endereco" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Data de Admissão *</label>
                    <input type="date" class="form-control" name="data_admissao" min="1950-01-01" max="2099-12-31" required>
                </div>
                <div class="col-md-9 mb-3">
                    <label class="form-label fw-bold">Dependentes (Opcional)</label>
                    <input type="text" class="form-control" name="dependentes" placeholder="Nome dos dependentes separados por vírgula">
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                <button type="submit" class="btn btn-primary-agmeal px-5 fw-bold"><i class="fa-solid fa-save me-2"></i>Salvar Cadastro</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function mascaraCPF(cpf) {
        let valor = cpf.value.replace(/\D/g, "");
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        cpf.value = valor;
    }
</script>
{% endblock %}
