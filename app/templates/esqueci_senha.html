<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC - Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--agmeal-azul);
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 style="color: var(--agmeal-azul); font-weight: bold;">SGC - AGMEAL</h3>
                <p class="text-muted">Recuperação de Acesso</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} text-center" style="font-size: 0.9rem;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('esqueci_senha') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome de Usuário</label>
                    <input type="text" class="form-control" name="username" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Palavra de Recuperação</label>
                    <input type="password" class="form-control" name="palavra_recuperacao" placeholder="Sua frase secreta" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Nova Senha</label>
                    <input type="password" class="form-control" name="nova_senha" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-agmeal btn-lg">Redefinir Senha</button>
                    <a href="/login" class="btn btn-outline-secondary">Voltar ao Login</a>
                </div>
            </form>
        </div>
    </div>
    <script>
    // Faz os alertas sumirem sozinhos após 4 segundos (4000 milissegundos)
    setTimeout(function() {
        let alertas = document.querySelectorAll('.alert:not(.alert-secondary)');
        alertas.forEach(function(alerta) {
            let bsAlert = new bootstrap.Alert(alerta);
            bsAlert.close();
        });
    }, 4000);
</script>
</body>
</html>
