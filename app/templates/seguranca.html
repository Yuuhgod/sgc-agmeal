{% extends "base.html" %}

{% block title %}SGC - Segurança{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 border-top border-warning border-3">
            <div class="card-header bg-white pb-0 border-0 pt-4">
                <h4 style="color: var(--agmeal-azul);"><i class="fa-solid fa-key me-2 text-warning"></i>Alterar Frase de Segurança</h4>
                <p class="text-muted small">Esta frase será necessária caso você esqueça a sua senha de acesso ao sistema.</p>
            </div>
            <div class="card-body">
                <form action="/seguranca" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Nova Frase de Segurança</label>
                        <input type="password" class="form-control" name="nova_palavra" placeholder="Digite uma nova frase marcante..." required>
                    </div>
                    
                    <div class="alert alert-secondary py-3 border-0">
                        <p class="mb-2 fw-bold text-dark"><i class="fa-solid fa-lock me-2"></i>Confirmação de Segurança</p>
                        <label class="form-label mb-1" style="font-size: 0.9rem;">Digite sua senha atual de acesso:</label>
                        <input type="password" class="form-control" name="senha_atual" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning px-4 fw-bold text-dark">Atualizar Frase</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
