{% extends "base.html" %}

{% block title %}SGC - Editar Associado{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header card-header-agmeal d-flex justify-content-between align-items-center">
        <span><i class="fa-solid fa-user-pen me-2"></i>Editando Cadastro: {{ associado.nome }}</span>
        <a href="/buscar" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Voltar</a>
    </div>
    <div class="card-body">
        <form action="/editar/{{ associado.id }}" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome" value="{{ associado.nome }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Matrícula *</label>
                    <input type="text" class="form-control" name="matricula" value="{{ associado.matricula }}" maxlength="20" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">CPF *</label>
                    <input type="text" class="form-control" name="cpf" value="{{ associado.cpf }}" maxlength="14" oninput="mascaraCPF(this)" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">RG *</label>
                    <input type="text" class="form-control" name="rg" value="{{ associado.rg }}" maxlength="20" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Data de Nascimento *</label>
                    <input type="date" class="form-control" name="data_nascimento" value="{{ associado.data_nascimento.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">E-mail *</label>
                    <input type="email" class="form-control" name="email" value="{{ associado.email }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Endereço Completo *</label>
                    <input type="text" class="form-control" name="endereco" value="{{ associado.endereco }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Data de Admissão *</label>
                    <input type="date" class="form-control" name="data_admissao" value="{{ associado.data_admissao.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-9 mb-3">
                    <label class="form-label fw-bold">Dependentes (Opcional)</label>
                    <input type="text" class="form-control" name="dependentes" value="{{ associado.dependentes or '' }}">
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                <button type="submit" class="btn btn-primary-agmeal px-5 fw-bold"><i class="fa-solid fa-arrows-rotate me-2"></i>Atualizar Dados</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function mascaraCPF(cpf) {
        let valor = cpf.value.replace(/\D/g, "");
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        cpf.value = valor;
    }
</script>
{% endblock %}
