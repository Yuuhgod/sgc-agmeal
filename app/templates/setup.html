<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>SGC - Primeira Configuração</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
        <style>
            /* Fundo alterado para o Azul Padrão */
            body {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: var(--agmeal-azul);
            }
            /* Borda do cartão alterada para Dourado para dar destaque no fundo escuro */
            .setup-card {
                width: 100%;
                max-width: 500px;
                border-radius: 10px;
                border-top: 5px solid var(--agmeal-ouro);
            }
        </style>
    </head>
    <body>
        <div class="card setup-card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img
                        src="{{ url_for('static', filename='img/logo.jpeg') }}"
                        alt="Logo AGMEAL"
                        style="
                            height: 110px;
                            margin-bottom: 15px;
                            border-radius: 50%;
                            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
                        "
                    />
                    <h3 style="color: var(--agmeal-azul); font-weight: bold">
                        Bem-vindo ao SGC
                    </h3>
                    <p class="text-muted">
                        Esta é a primeira execução do sistema. Por favor, crie a
                        conta de Administrador principal.
                    </p>
                </div>
                <form action="{{ url_for('setup') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold"
                            >Nome de Usuário</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            required
                            autocomplete="off"
                        />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"
                            >Senha de Acesso</label
                        >
                        <input
                            type="password"
                            class="form-control"
                            name="senha"
                            required
                        />
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold"
                            >Palavra de Recuperação (Segurança)</label
                        >
                        <input
                            type="password"
                            class="form-control"
                            name="palavra_recuperacao"
                            placeholder="Uma frase para caso perca a senha"
                            required
                        />
                    </div>
                    <div class="d-grid">
                        <button
                            type="submit"
                            class="btn btn-primary-agmeal btn-lg"
                        >
                            Finalizar Instalação
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script>
            // Faz os alertas sumirem sozinhos após 4 segundos (4000 milissegundos)
            setTimeout(function () {
                let alertas = document.querySelectorAll(
                    ".alert:not(.alert-secondary)",
                );
                alertas.forEach(function (alerta) {
                    let bsAlert = new bootstrap.Alert(alerta);
                    bsAlert.close();
                });
            }, 4000);
        </script>
    </body>
</html>
