<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC - Login AGMEAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--agmeal-azul); /* Fundo escuro para a tela de login */
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="Logo AGMEAL" style="height: 110px; margin-bottom: 15px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                <h3 style="color: var(--agmeal-azul); font-weight: bold;">SGC - AGMEAL</h3>
                <p class="text-muted">Acesso Restrito</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} text-center" style="font-size: 0.9rem;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuário</label>
                    <input type="text" class="form-control" name="username" required autocomplete="off">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Senha</label>
                    <input type="password" class="form-control" name="senha" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary-agmeal btn-lg">Entrar</button>
                </div>
                <div class="mb-4 text-end">
                    <a href="/esqueci_senha" style="color: var(--agmeal-ouro); text-decoration: none; font-size: 0.9rem;">Esqueci minha senha</a>
                </div>
            </form>
        </div>
    </div>
    <script>
    // Faz os alertas sumirem sozinhos após 4 segundos (4000 milissegundos)
    setTimeout(function() {
        let alertas = document.querySelectorAll('.alert:not(.alert-secondary)');
        alertas.forEach(function(alerta) {
            let bsAlert = new bootstrap.Alert(alerta);
            bsAlert.close();
        });
    }, 4000);
</script>

</body>
</html>
