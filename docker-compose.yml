version: '3.8'

services:
  agmeal-app:
    build: .
    container_name: sgc-agmeal-web
    restart: unless-stopped
    volumes:
      - ./data:/sgc/data
    environment:
      - TZ=America/Maceio

  nginx:
    image: nginx:alpine
    container_name: sgc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agmeal-app